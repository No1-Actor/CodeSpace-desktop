<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        [v-cloak] {
            display: none;
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <template id="my-app">
        <!-- v-pre 不会被编译 -->
        <h2 v-pre>{{message}}</h2> 
        <h2 v-cloak>{{message}}</h2>
    </template>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
        const App = {
            template:'#my-app',
            data() {
                return {
                    message: 'hello world'
                }
            },
            methods: {
                
            }
        }
        Vue.createApp(App).mount('#app')
    </script>
</body>
</html>
