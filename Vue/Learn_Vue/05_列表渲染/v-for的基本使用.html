<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="app"></div>
    <template id="my-app">
        <h2>歌曲列表</h2>
        <ul>
            <!-- 为了提高渲染效率，需要为每一个循环的元素添加一个唯一的  key -->
            <li 
                v-for="(item, index, key) in songs" 
                :key="key" 
            >
                {{index}} -- {{key}} -- {{item}} 
                <a href="#" @click="del(index)">X</a>
            </li>
        </ul>
    </template>


    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
        const App = {
            template: '#my-app',
            data() {
                return {
                    songs: {
                        first: '夜曲',
                        second: '夜的第七章',
                        third: '七里香',
                        forth: '发如雪',
                        firth: '珊瑚海'
                }
                }
            },
            methods: {
                del(i) {
                    this.songs.splice(i, 1)
                }
            }
        }
        Vue.createApp(App).mount('#app')
    </script>
</body>
</html>
